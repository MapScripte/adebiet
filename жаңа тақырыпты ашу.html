<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жаңа тақырыпты анықта!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            width: 200px;
            height: 250px;
            background-color: #3498db;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .card.flipped {
            transform: rotateY(180px);
            background-color: #fff;
        }

        .card .front {
            font-size: 80px;
            color: white;
        }

        .card .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            transform: rotateY(180deg);
            background-size: cover;
            background-position: center;
            border: 5px solid #fff;
        }

        /* Суреттер орнына мағыналы иконкалар немесе түстер қолданылды */
        #img1 { background-image: url('жаңа т1.png'); background-color: #ecf0f1; }
        #img2 { background-image: url('жаңа т2.png'); background-color: #ecf0f1; }
        #img3 { background-image: url('жаңа т3.png'); background-color: #ecf0f1; }

        .reveal-btn {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: none;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .reveal-btn:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        #topic-title {
            display: none;
            font-size: 50px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            animation: fadeIn 2s;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        p { font-size: 18px; color: #7f8c8d; }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #3498db; color: rgb(255, 252, 252);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>

    <div id="game-area">
        <h1>Бүгінгі сабақтың тақырыбы қандай?</h1>
        <p style="text-align: center;">Суреттерді ашып, мағынасын біріктіріп көр...</p>
        
        <div class="container">
            <div class="card" onclick="flipCard(this)">
                <div class="front">?</div>
                <div class="back" id="img1"></div>
            </div>
            <div class="card" onclick="flipCard(this)">
                <div class="front">?</div>
                <div class="back" id="img2"></div>
            </div>
            <div class="card" onclick="flipCard(this)">
                <div class="front">?</div>
                <div class="back" id="img3"></div>
            </div>
        </div>

        <div style="text-align: center;">
            <button id="check-btn" class="reveal-btn" onclick="showTopic()">Тақырыпты ашу</button>
        </div>
    </div>

    <div id="topic-title">
        <span style="color: #e67e22;">Жаңа тақырып:</span> <br>
        "АНАСЫН САҒЫНҒАН БАЛА"
    </div>

    <script>
        let flippedCount = 0;
        const totalCards = 3;

        function flipCard(card) {
            if (!card.classList.contains('flipped')) {
                card.style.transform = "rotateY(180deg)";
                card.classList.add('flipped');
                flippedCount++;

                if (flippedCount === totalCards) {
                    document.getElementById('check-btn').style.display = 'inline-block';
                }
            }
        }

        function showTopic() {
            document.getElementById('game-area').style.display = 'none';
            const topic = document.getElementById('topic-title');
            topic.style.display = 'block';
            
            // Салтанатты дыбыс әсері үшін (опционалды)
            const confetti = '🎉';
            console.log("Сабақ басталды!");
        }
    </script>
</body>
</html>
