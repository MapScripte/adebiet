<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litera — Жарқын Неон Стилі</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            /* Жарқын неон түстері */
            --neon-purple: #9d00ff;
            --neon-pink: #ff00de;
            --neon-blue: #00d2ff;
            /* Ашық фон түстері */
            --body-bg: #f5f7fa;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --border-color: #e2e8f0;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: var(--body-bg);
            /* Жеңіл градиент */
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            width: 98%;
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Жарқын тақырып */
        .header-section {
            text-align: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 15px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .neon-title {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            /* Мәтінге градиент беру */
            background: linear-gradient(to right, var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Ашық фондағы неонды жарқырау эффекті */
            filter: drop-shadow(0 0 5px rgba(157, 0, 255, 0.5));
            margin: 0;
        }

        .download-btn {
            margin-top: 15px;
            background: transparent;
            color: var(--neon-purple);
            border: 2px solid var(--neon-purple);
            padding: 10px 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(157, 0, 255, 0.2);
        }

        .download-btn:hover {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 5px 15px rgba(157, 0, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Оқушылар торы */
        .students-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            width: 100%;
            perspective: 1000px; /* 3D эффект үшін */
        }

        /* Ашық түсті карталар */
        .student-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .student-card:hover {
            border-color: var(--neon-pink);
            transform: translateY(-5px) rotateX(2deg);
            box-shadow: 0 10px 25px rgba(255, 0, 222, 0.15);
        }

        /* Ашық енгізу өрісі */
        .student-name {
            width: 100%;
            background: #f8fafc;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            margin-bottom: 12px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .student-name:focus {
            border-color: var(--neon-blue);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.1);
        }

        .rating-box {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-bottom: 10px;
        }

        /* Неонды қаламдар */
        .feather {
            font-size: 19px;
            cursor: pointer;
            color: #cbd5e1; /* Белсенді емес түс */
            transition: all 0.2s ease;
            user-select: none;
        }

        .feather:hover {
            color: var(--neon-blue);
            transform: scale(1.2);
        }

        /* Белсенді неонды қалам */
        .feather.active {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink), 0 0 10px var(--neon-pink);
            animation: feather-pulse 1s infinite alternate;
        }

        @keyframes feather-pulse {
            from { transform: scale(1); opacity: 0.9; }
            to { transform: scale(1.1); opacity: 1; }
        }

        .status-msg {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            padding: 3px 8px;
            border-radius: 4px;
            background: #f1f5f9;
        }

        /* Монитор өлшеміне қарай бейімделу */
        @media (max-height: 850px) {
            .neon-title { font-size: 2rem; }
            .student-card { padding: 10px; }
            .feather { font-size: 17px; }
            .students-grid { gap: 10px; }
        }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #9d00ff; color: rgb(255, 251, 251);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>
    
    <div class="main-container">
        <div class="header-section">
            <h1 class="neon-title">Бағалау парағы</h1>
            <button class="download-btn" onclick="downloadExcel()">📊 НӘТИЖЕНІ САҚТАУ</button>
        </div>
        
        <div class="students-grid" id="grid">
            </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const studentData = Array(25).fill(0).map((_, i) => ({ id: i, name: '', score: 0 }));

        // Карталарды генерациялау
        for (let i = 0; i < 25; i++) {
            const card = document.createElement('div');
            card.className = 'student-card';
            card.innerHTML = `
                <input type="text" class="student-name" placeholder="Оқушы №${i+1}" oninput="updateName(${i}, this.value)">
                <div class="rating-box" id="rating-${i}">
                    ${Array(10).fill(0).map((_, j) => `<span class="feather" onclick="rate(${i}, ${j + 1})">✒️</span>`).join('')}
                </div>
                <div class="status-msg" id="msg-${i}">КҮТУДЕ</div>
            `;
            grid.appendChild(card);
        }

        function updateName(id, val) { studentData[id].name = val; }

        function rate(studentId, score) {
            studentData[studentId].score = score;
            
            // Жоғары балл үшін конфетти (неон түстерінде)
            if (score >= 9) {
                confetti({
                    particleCount: 50,
                    spread: 70,
                    origin: { y: 0.8 },
                    colors: ['#9d00ff', '#ff00de', '#00d2ff']
                });
            }
            
            const container = document.getElementById(`rating-${studentId}`);
            const stars = container.querySelectorAll('.feather');
            
            // Қаламдарды белсендіру
            stars.forEach((s, index) => {
                if (index < score) {
                    s.classList.add('active');
                } else {
                    s.classList.remove('active');
                }
            });

            // Мәртебені және түсін жаңарту (ашық фонда көрінетіндей)
            const msg = document.getElementById(`msg-${studentId}`);
            if (score === 0) {
                msg.innerText = "КҮТУДЕ";
                msg.style.color = "#94a3b8";
                msg.style.background = "#f1f5f9";
            } else if (score <= 3) {
                msg.innerText = "ТӨМЕН";
                msg.style.color = "#718096"; // Қараңғылау сұр
                msg.style.background = "#edf2f7";
            } else if (score <= 6) {
                msg.innerText = "ОРТА";
                msg.style.color = "#805ad5"; // Күлгін
                msg.style.background = "#faf5ff";
            } else if (score <= 8) {
                msg.innerText = "ЖОҒАРЫ";
                msg.style.color = "#d53f8c"; // Қызғылт
                msg.style.background = "#fff5f7";
            } else {
                msg.innerText = "ӨТЕ ЖОҒАРЫ";
                msg.style.color = "#00b5d8"; //Көгілдір
                msg.style.background = "#e0f7fa";
            }
        }

        function downloadExcel() {
            let csvContent = "\uFEFFОқушы;Балл (✒️)\n";
            studentData.forEach((s, index) => {
                let name = s.name || `${index + 1}-оқушы`;
                csvContent += `${name};${s.score}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Litera_Neon_Report.csv";
            link.click();
        }
    </script>
</body>
</html>
