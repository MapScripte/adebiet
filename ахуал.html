<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Психологиялық ахуал: Сағыныш сәулесі</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 90%;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .instruction { font-size: 1.2rem; color: #7f8c8d; margin-bottom: 30px; }
        .step-box {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .action-text {
            font-size: 2rem;
            font-weight: bold;
            color: #e67e22;
            margin: 20px 0;
            animation: fadeIn 1s;
        }
        .emoji { font-size: 4rem; margin-bottom: 10px; }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background-color: #2980b9; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #fcfdfd; color: rgb(5, 5, 5);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>

<div class="container">
    <h1>«Сағыныш сәулесі»</h1>
    <p class="instruction">Анамаызға деген сағыныш пен жылулықты сезінейік...</p>
    
    <div id="exercise" class="step-box">
        <div class="emoji">👋</div>
        <div class="action-text">Дайын болсаңдар, "Бастау" батырмасын басыңдар</div>
        <button class="btn" onclick="nextStep()">Бастау</button>
    </div>
</div>

<script>
    let currentStep = 0;
    const steps = [
        { emoji: "🌅", text: "Қолымызды жоғары жайып, күннің шуағын жинаймыз...", color: "#f1c40f" },
        { emoji: "❤️", text: "Сол шуақты жүрегімізге басамыз, анамыздың жылуын сезінеміз...", color: "#e74c3c" },
        { emoji: "🌬️", text: "Терең тыныс алып, сағыныш лебін сыртқа шығарамыз...", color: "#3498db" },
        { emoji: "🤝", text: "Оң жағымыздағы досымызға күлімсіреп қараймыз...", color: "#2ecc71" },
        { emoji: "😊", text: "«Анашым, мен сені жақсы көремін!» деп іштей айтамыз...", color: "#9b59b6" },
        { emoji: "📚", text: "Енді сабаққа зейін қоюға дайынбыз!", color: "#2c3e50" }
    ];

    function nextStep() {
        if (currentStep < steps.length) {
            const step = steps[currentStep];
            document.getElementById('exercise').innerHTML = `
                <div class="emoji">${step.emoji}</div>
                <div class="action-text" style="color: ${step.color}">${step.text}</div>
                <button class="btn" onclick="nextStep()">Келесі қимыл ➡️</button>
            `;
            currentStep++;
        } else {
            document.getElementById('exercise').innerHTML = `
                <div class="emoji">✨</div>
                <div class="action-text">Сәттілік, жас достар!</div>
                <button class="btn" onclick="location.reload()">Қайталау</button>
            `;
        }
    }
</script>

</body>
</html>
