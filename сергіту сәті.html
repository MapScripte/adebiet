<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сергіту сәті: Сағыныш</title>
    <style>
        :root {
            --bright-blue: #00d2ff;
            --bright-pink: #ff007f;
            --bright-purple: #9d00ff;
            --bg-color: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            width: 90%;
            max-width: 600px;
            background: #fff;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.1);
            border: 4px solid var(--bright-blue);
            position: relative;
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #display-area {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .emoji {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.1));
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .instruction-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--bright-purple);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .description {
            font-size: 1.1rem;
            color: #666;
            margin-top: 10px;
        }

        .btn-start {
            background: var(--bright-blue);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px var(--bright-blue);
            transition: 0.3s;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px var(--bright-blue);
            background: var(--bright-purple);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }

        #progress-inner {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, var(--bright-blue), var(--bright-pink));
            transition: width 0.5s;
        }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #00d2ff; color: rgb(249, 248, 248);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>

<div class="card">
    <h1>Сергіту сәті</h1>
    <p>«Анасын сағынған бала» тақырыбы аясында</p>
    
    <div id="display-area">
        <div class="emoji" id="emoji">👋</div>
        <div class="instruction-text" id="main-text">Дайынсың ба?</div>
        <div class="description" id="sub-text">Батырманы басып, қимылдарды бірге қайтала!</div>
    </div>

    <button class="btn-start" id="action-btn" onclick="startExercise()">БАСТАУ</button>

    <div class="progress-bar">
        <div id="progress-inner"></div>
    </div>
</div>

<script>
    const steps = [
        { emoji: "✉️", title: "Хат бүктейміз", desc: "Қолымызды алға созып, саусақтарды жұмамыз", color: "#00d2ff" },
        { emoji: "👀", title: "Жолға қараймыз", desc: "Басымызды ақырын оңға және солға бұрамыз", color: "#9d00ff" },
        { emoji: "✨", title: "Үміт ұшқыны", desc: "Көзімізді қатты жұмып, 3 секундтан кейін ашамыз", color: "#ff007f" },
        { emoji: "🌬️", title: "Жылу үрлейміз", desc: "Терең тыныс алып, алақанымызға жылы дем шығарамыз", color: "#00d2ff" },
        { emoji: "🕊️", title: "Хатты ұшырамыз", desc: "Қолымызды құс қанатындай сермеп, жоғары көтереміз", color: "#9d00ff" }
    ];

    let currentStep = 0;

    function startExercise() {
        const btn = document.getElementById('action-btn');
        btn.style.display = 'none'; // Бастағанда батырманы жасыру
        
        runNextStep();
    }

    function runNextStep() {
        if (currentStep < steps.length) {
            const step = steps[currentStep];
            
            // Мазмұнды жаңарту
            document.getElementById('emoji').innerText = step.emoji;
            document.getElementById('main-text').innerText = step.title;
            document.getElementById('sub-text').innerText = step.desc;
            document.getElementById('main-text').style.color = step.color;
            
            // Прогресс бар
            const progress = ((currentStep + 1) / steps.length) * 100;
            document.getElementById('progress-inner').style.width = progress + "%";

            currentStep++;
            
            // 4 секундтан кейін келесі жаттығуға өту
            setTimeout(runNextStep, 5000);
        } else {
            // Соңы
            document.getElementById('emoji').innerText = "😊";
            document.getElementById('main-text').innerText = "Керемет!";
            document.getElementById('sub-text').innerText = "Сабағымызды жақсы көңіл-күймен жалғастырамыз!";
            
            const btn = document.getElementById('action-btn');
            btn.innerText = "ҚАЙТАЛАУ";
            btn.style.display = 'inline-block';
            btn.onclick = () => location.reload();
            currentStep = 0;
        }
    }
</script>

</body>
</html>
