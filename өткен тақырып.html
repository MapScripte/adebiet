<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Әдебиет әлемі: Сұрақ-жауап</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Montserrat:wght@400;700&display=swap');

        body {
            background: linear-gradient(135deg, #e0f2f1 0%, #f3e5f5 100%);
            color: #2c3e50;
            font-family: 'Comfortaa', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            zoom: 1.1; 
        }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            border: 6px solid #4fc3f7;
            border-radius: 40px;
            padding: 50px;
            width: 90%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        h1 {
            color: #0277bd;
            font-family: 'Montserrat', sans-serif;
            margin-top: 0;
            font-size: 2.5rem;
        }

        .quote-box {
            font-style: italic;
            color: #546e7a;
            margin: 30px 0;
            padding: 25px;
            border-left: 8px solid #4fc3f7;
            background: #f1f8ff;
            font-size: 1.4rem;
            line-height: 1.6;
        }

        #question-box {
            font-size: 1.8rem;
            min-height: 180px;
            margin: 30px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fffde7;
            border-radius: 20px;
            padding: 30px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            line-height: 1.4;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        button {
            padding: 20px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .start-btn { 
            background: #0288d1; 
            box-shadow: 0 8px 0 #01579b; 
            width: 100%; 
            font-size: 1.6rem;
        }
        
        .true-btn { background: #4caf50; box-shadow: 0 8px 0 #2e7d32; }
        .false-btn { background: #ff5252; box-shadow: 0 8px 0 #c62828; }

        button:active { transform: translateY(6px); box-shadow: none; }

        #progress {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #546e7a;
        }

        #feedback {
            margin-top: 30px;
            font-size: 2rem;
            font-weight: bold;
            height: 45px;
        }

        #score-board { 
            margin-top: 25px; 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #0277bd; 
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #00d2ff; color: white;
            border: none; padding: 15px 25px;
            font-size: 1.1rem; border-radius: 15px;
            cursor: pointer; z-index: 150;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .hidden { display: none; }
        .correct { color: #2e7d32; animation: pop 0.3s; }
        .wrong { color: #c62828; animation: shake 0.3s; }

        /* Жауап бергендегі эффектілер */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

<button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>

<audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<div id="game-container">
    <div id="start-screen">
        <h1>Қош келдің! 🌟</h1>
        <div class="quote-box">
            «Анасын сағынған бала еңбектеніп, өткенін қайталау арқылы өзін дамытады»
        </div>
        <p style="font-size: 1.3rem;">Өткен тақырып бойынша біліміңді тексеруге дайынсың ба?</p>
        <button class="start-btn" onclick="startGame()">Ойынды бастау 🚀</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress">Сұрақ: <span id="current-q">1</span> / 5</div>
        <div id="question-box"></div>
        <div class="btn-container">
            <button class="true-btn" onclick="checkAnswer(true)">Шындық ✅</button>
            <button class="false-btn" onclick="checkAnswer(false)">Жалған ❌</button>
        </div>
        <div id="feedback"></div>
        <div id="score-board">Ұпай: <span id="score">0</span></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Ойын аяқталды! 🎉</h2>
        <p id="final-msg"></p>
        <button class="start-btn" onclick="location.reload()">Қайта бастау 🔄</button>
    </div>
</div>

<script>
    const questions = [
        { text: "«Анасын сағынған бала» шығармасының негізгі идеясы — баланың анасына деген сағынышы мен мейірімін көрсету.", answer: true },
        { text: "Шығармада кейіпкердің мінезі тек оның сыртқы портреті арқылы ғана ашылады, іс-әрекеті маңызды емес.", answer: false },
        { text: "Баланың әрекеттері мен сезімдері арқылы оның ішкі жан дүниесі, анасына деген сағынышы анық көрінеді.", answer: true },
        { text: "Эпикалық шығармада автор мүлде байқалмайды, оның көзқарасын анықтау мүмкін емес.", answer: false },
        { text: "Автор бейнесі кейіпкерлерге берген сипаттамалары мен оқиғаға деген көзқарасы арқылы байқалады.", answer: true }
    ];

    let currentIdx = 0;
    let score = 0;

    // Дыбыстарды алдын ала жүктеу
    const correctSound = document.getElementById('sound-correct');
    const wrongSound = document.getElementById('sound-wrong');

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIdx < questions.length) {
            document.getElementById('question-box').textContent = questions[currentIdx].text;
            document.getElementById('current-q').textContent = currentIdx + 1;
            document.getElementById('feedback').textContent = "";
        } else {
            showResults();
        }
    }

    function checkAnswer(userAnswer) {
        const isCorrect = userAnswer === questions[currentIdx].answer;
        const feedback = document.getElementById('feedback');
        
        if (isCorrect) {
            score++;
            feedback.textContent = "Дұрыс! 👍";
            feedback.className = "correct";
            
            // Позитивті дыбысты қосу
            correctSound.currentTime = 0; // Дыбысты басынан бастау
            correctSound.play();
        } else {
            feedback.textContent = "Қате! 😮";
            feedback.className = "wrong";
            
            // Қате дыбысын қосу
            wrongSound.currentTime = 0;
            wrongSound.play();
        }

        document.getElementById('score').textContent = score;

        // Келесі сұраққа өту
        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 1300);
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        const resultScreen = document.getElementById('result-screen');
        resultScreen.classList.remove('hidden');
        
        let msg = score === 5 ? "Тамаша! Сен бәрін біледі екенсің! 🏆" : "Жақсы! Біліміңді әлі де шыңдай түс! 💪";
        document.getElementById('final-msg').innerHTML = `Сенің нәтижең: <b>${score} / 5</b><br>${msg}`;
    }
</script>

</body>
</html>
